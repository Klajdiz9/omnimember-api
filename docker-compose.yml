version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: omnimember
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/omnimember
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret_change_in_production
      JWT_REFRESH_SECRET: refresh_supersecret
      PORT: 3005
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:
